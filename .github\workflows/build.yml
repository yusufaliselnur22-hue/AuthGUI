name: Build & Release AuthGUI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven ile derle
        run: mvn clean package -B

      - name: JAR dosyasını artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: AuthGUI-Plugin
          path: target/AuthGUI-*.jar

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven ile derle
        run: mvn clean package -B

      - name: GitHub Release oluştur ve JAR yükle
        uses: softprops/action-gh-release@v2
        with:
          files: target/AuthGUI-*.jar
          generate_release_notes: true
